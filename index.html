<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DoneBy</title>
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2a1f19; --bg2:#352720; --card:#3a2b23;
    --gold:#d8b06a; --gold-soft:#c9a24b;
    --ink:#f2ebe0; --muted:#9c8b7d; --line:rgba(216,176,106,.22);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;overflow-x:hidden}
  body{background:radial-gradient(120% 80% at 50% 0%,#3a2b23 0%,var(--bg) 60%)}
  .wrap{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:22px 20px 40px}

  /* header */
  .top{display:flex;justify-content:space-between;align-items:center}
  .logo{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:.3px}
  .logo b{color:var(--gold)}
  .count{font-size:13px;color:var(--muted)}
  .eyebrow{text-align:center;color:var(--gold);font-size:12px;letter-spacing:4px;
    font-weight:600;margin:18px 0 6px}

  /* stage */
  .stageWrap{position:relative;height:360px;perspective:1100px;margin:6px 0 10px;
    display:flex;align-items:center;justify-content:center}
  .stage{position:absolute;left:50%;top:50%;transform-style:preserve-3d;will-change:transform}
  .card{position:absolute;width:var(--cw,236px);height:var(--ch,320px);left:calc(var(--cw,236px)/-2);top:calc(var(--ch,320px)/-2);border-radius:16px;
    overflow:hidden;background:#3a2b23 center/cover no-repeat;
    box-shadow:0 26px 50px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.10);
    will-change:transform,opacity}
  .card::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:linear-gradient(125deg,rgba(255,255,255,.16),rgba(255,255,255,0) 40%,rgba(255,255,255,0) 70%,rgba(255,255,255,.06))}
  .card video{width:100%;height:100%;object-fit:cover}
  .taphint{position:absolute;bottom:2px;left:0;right:0;text-align:center;color:var(--muted);font-size:13px}

  /* title */
  .title{font-family:'Fraunces',serif;font-size:40px;font-weight:600;text-align:center;margin:6px 0 4px}
  .sub{text-align:center;color:var(--muted);font-size:15px;margin-bottom:22px}

  /* buttons */
  .btns{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
  .btn{border:none;font-family:inherit;font-size:16px;font-weight:600;padding:15px 26px;border-radius:40px;cursor:pointer}
  .btn.gold{background:linear-gradient(180deg,var(--gold),var(--gold-soft));color:#2a1c12;
    box-shadow:0 10px 26px rgba(216,176,106,.28)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}

  .note{text-align:center;color:var(--muted);font-size:13px;line-height:1.6;max-width:380px;margin:0 auto}

  /* empty state */
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted)}
  .empty .ring{width:120px;height:120px;border-radius:20px;border:1px dashed var(--line);
    display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--gold)}

  /* fullscreen viewer */
  .viewer{position:fixed;inset:0;background:rgba(15,10,8,.94);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
  .viewer.open{display:flex}
  .viewer img,.viewer video{max-width:100%;max-height:100%;border-radius:12px;object-fit:contain}
  .viewer .x{position:absolute;top:18px;right:18px;width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.14);color:#fff;border:none;font-size:20px;cursor:pointer}
  .viewer .del{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    background:rgba(200,50,50,.92);color:#fff;border:none;padding:12px 22px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#3a2b23;color:var(--ink);border:1px solid var(--line);padding:12px 20px;border-radius:30px;
    font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">Done<b>By</b></div>
    <div class="count"><span id="pcount">0</span> photos</div>
  </div>

  <div class="eyebrow">MY PORTFOLIO</div>

  <div class="stageWrap">
    <div class="stage" id="stage"></div>
    <div class="empty" id="empty">
      <div class="ring">＋</div>
      <div>Add your best work to start</div>
    </div>
    <div class="taphint" id="hint" style="display:none">tap a photo to see it big · drag to spin</div>
  </div>

  <div class="title">My work</div>
  <div class="sub" id="subline">Add photos and they spin here</div>

  <div class="btns">
    <button class="btn gold" onclick="pick()">＋ Add photos</button>
    <button class="btn ghost" onclick="clearAll()">Clear all</button>
  </div>

  <div class="note">Photos are saved right here on your device — close it, come back, they're still here. Nothing is uploaded anywhere.</div>
</div>

<input id="file" type="file" accept="image/*,.heic,.heif,video/*" multiple hidden>

<div class="viewer" id="viewer">
  <button class="x" onclick="closeViewer()">✕</button>
  <div id="vbody"></div>
  <button class="del" onclick="delCurrent()">Delete photo</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let photos = [];              // {src, type}
  let angle = 0, vel = 0, dragging = false, lastX = 0, ringR = 300;
  let curView = -1;
  const stage = document.getElementById('stage');
  const MAX = 30;

  function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

  function save(){
    try{localStorage.setItem('donebyNew',JSON.stringify({photos:photos.filter(p=>p.type==='img')}));}catch(e){}
  }
  function load(){
    try{const s=JSON.parse(localStorage.getItem('donebyNew'));if(s&&s.photos)photos=s.photos;}catch(e){}
  }

  function pick(){document.getElementById('file').click();}
  document.getElementById('file').addEventListener('change',e=>{
    const files=[...e.target.files];
    files.forEach(f=>{
      if(photos.length>=MAX){toast('Photo limit reached');return;}
      if(f.type.startsWith('video')){photos.push({src:URL.createObjectURL(f),type:'vid'});build();save();return;}
      const isHeic = /heic|heif/i.test(f.type) || /\.hei[cf]$/i.test(f.name);
      if(isHeic && window.heic2any){
        toast('Converting photo…');
        heic2any({blob:f,toType:'image/jpeg',quality:0.85})
          .then(out=>{const r=new FileReader();r.onload=ev=>shrink(ev.target.result,small=>{photos.push({src:small,type:'img'});build();save();});r.readAsDataURL(out);})
          .catch(()=>toast('Could not read that photo'));
      } else {
        const r=new FileReader();
        r.onload=ev=>{shrink(ev.target.result,small=>{photos.push({src:small,type:'img'});build();save();});};
        r.readAsDataURL(f);
      }
    });
    e.target.value='';
  });

  // shrink images so the phone stays fast + localStorage fits
  function shrink(dataURL,cb){
    const img=new Image();
    img.onload=()=>{
      const max=1200;let{width:w,height:h}=img;
      if(w>max||h>max){const s=Math.min(max/w,max/h);w*=s;h*=s;}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.82));
    };
    img.src=dataURL;
  }

  function build(){
    stage.innerHTML='';
    const n=photos.length;
    document.getElementById('pcount').textContent=n;
    document.getElementById('empty').style.display=n?'none':'flex';
    document.getElementById('hint').style.display=n?'block':'none';
    document.getElementById('subline').textContent = n? 'Tap a photo to see it big · drag to spin' : 'Add photos and they spin here';
    if(!n)return;
    ringR = n<2 ? (window._cw||236)*1.3 : Math.max((window._cw||236)*1.0,((window._cw||236)+24)/(2*Math.sin(Math.PI/n)));
    photos.forEach((p,i)=>{
      const c=document.createElement('div');c.className='card';c.dataset.i=i;
      if(p.type==='vid'){const v=document.createElement('video');v.src=p.src;v.muted=true;v.loop=true;v.autoplay=true;v.playsInline=true;v.setAttribute('playsinline','');c.appendChild(v);v.play().catch(()=>{});}
      else c.style.backgroundImage='url('+p.src+')';
      const base=i*(360/n);c.dataset.base=base;
      c.style.transform='rotateY('+base+'deg) translateZ('+ringR+'px)';
      c.addEventListener('click',()=>{if(!moved)openViewer(i);});
      stage.appendChild(c);
    });
  }

  function frame(){
    if(!dragging&&Math.abs(vel)>0.02){angle+=vel;vel*=0.94;}
    stage.style.transform='translateZ(-'+ringR+'px) rotateY('+angle+'deg)';
    // brighten + scale the front card, dim the rest
    [...stage.children].forEach(c=>{
      const base=parseFloat(c.dataset.base);
      let d=((base+angle)%360+360)%360; if(d>180)d=360-d;   // 0 = front
      const t=1-Math.min(d,120)/120;
      c.style.opacity=(0.62+0.38*t).toFixed(3);
      c.style.filter='brightness('+(1.0+0.18*t).toFixed(3)+') contrast('+(1.02+0.06*t).toFixed(3)+') saturate('+(1.05+0.1*t).toFixed(3)+')';
      const sc=0.82+0.18*t;
      c.style.transform='rotateY('+base+'deg) translateZ('+ringR+'px) scale('+sc.toFixed(3)+')';
      c.style.zIndex=Math.round(t*100);
    });
    requestAnimationFrame(frame);
  }

  // drag to spin
  let moved=false;
  function down(x){dragging=true;lastX=x;vel=0;moved=false;}
  function move(x){if(!dragging)return;const dx=x-lastX;lastX=x;if(Math.abs(dx)>2)moved=true;
    const d=dx*0.4;angle+=d;vel=d;}
  function up(){dragging=false;}
  const sw=document.querySelector('.stageWrap');
  sw.addEventListener('mousedown',e=>down(e.clientX));
  window.addEventListener('mousemove',e=>move(e.clientX));
  window.addEventListener('mouseup',up);
  sw.addEventListener('touchstart',e=>down(e.touches[0].clientX),{passive:true});
  sw.addEventListener('touchmove',e=>move(e.touches[0].clientX),{passive:true});
  sw.addEventListener('touchend',up);

  function openViewer(i){
    curView=i;const p=photos[i];
    document.getElementById('vbody').innerHTML = p.type==='vid'
      ? '<video src="'+p.src+'" controls autoplay playsinline style="max-width:100%;max-height:100%"></video>'
      : '<img src="'+p.src+'">';
    document.getElementById('viewer').classList.add('open');
  }
  function closeViewer(){document.getElementById('viewer').classList.remove('open');curView=-1;}
  function delCurrent(){
    if(curView<0)return;
    if(!confirm('Delete this photo?'))return;
    photos.splice(curView,1);closeViewer();build();save();toast('Photo deleted');
  }

  function clearAll(){
    if(!photos.length)return;
    if(!confirm('Remove all photos?'))return;
    photos=[];build();save();toast('All cleared');
  }

  function sizeCards(){const w=Math.min(window.innerWidth,460);const cw=Math.min(210,Math.round(w*0.5));const ch=Math.round(cw*1.35);document.documentElement.style.setProperty('--cw',cw+'px');document.documentElement.style.setProperty('--ch',ch+'px');window._cw=cw;}
  sizeCards();window.addEventListener('resize',()=>{sizeCards();build();});
  load();build();requestAnimationFrame(frame);
</script>
</body>
</html>
